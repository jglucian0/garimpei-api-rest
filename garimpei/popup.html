<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <style>
      body {
        font-family: Arial, sans-serif;
        width: 280px;
        padding: 15px;
      }

      h3 {
        margin-top: 0;
      }

      .main-btn {
        width: 100%;
        padding: 12px;
        font-size: 15px;
        font-weight: bold;
        background: #3483fa;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      .main-btn:hover {
        background: #2968c8;
      }

      .copy-btn {
        margin-top: 8px;
        width: 100%;
        padding: 8px;
        font-size: 13px;
        cursor: pointer;
      }

      textarea {
        width: 100%;
        height: 90px;
        margin-top: 10px;
        font-size: 12px;
        padding: 6px;
        resize: none;
      }
    </style>
  </head>

  <body>
    <h3>Conectar Mercado Livre</h3>

    <p>Abra o Mercado Livre logado e clique no botão abaixo.</p>

    <button id="generate" class="main-btn">Gerar cookies da sessão</button>

    <textarea
      id="result"
      readonly
      placeholder="Os cookies aparecerão aqui..."
    ></textarea>

    <button id="copy" class="copy-btn">Copiar cookies</button>

    <script src="popup.js"></script>
  </body>
</html>
